{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexiAid – Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  @font-face {
    font-family: 'OpenDyslexic';
    src: url('/static/core/images/OpenDyslexic-Regular.ttf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
  @font-face {
    font-family: 'Sylexiad';
    src: url('/static/core/images/SylexiadSansThin.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
</style>
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
  <!-- Apply saved font/size globally on every page -->
<script>
  (function() {
    try {
      const settings = JSON.parse(localStorage.getItem('lexiaid_settings') || '{}');
      const FONTS = {
        opendyslexic: "'OpenDyslexic', sans-serif",
        sylexiad: "'Sylexiad', sans-serif",
        courier: "'Courier New', Courier, monospace",
        verdana: "Verdana, Geneva, sans-serif",
      };
      if (settings.fontFamily && FONTS[settings.fontFamily]) {
        document.documentElement.style.fontFamily = FONTS[settings.fontFamily];
      }
      if (settings.fontSize) {
        document.documentElement.style.fontSize = settings.fontSize + 'px';
      }
    } catch(e) {}
  })();
</script>
</head>
<body>

<div id="toast"></div>

<div class="forgot-center">
  <div class="forgot-inner fade-in">

    <div style="text-align:center; margin-bottom:1.5rem;">
      <div style="width:80px;height:80px;border-radius:1rem;background:var(--primary);
                  color:var(--pri-fore);display:flex;align-items:center;justify-content:center;
                  font-size:2rem;font-weight:800;margin:0 auto .75rem;">L</div>
      <h1>Reset Password</h1>
      <p>We'll send you a link to reset your password</p>
    </div>

    <div class="card space-y-5">

      <div id="forgot-success" class="success-msg" style="display:none;"></div>
      <div id="forgot-error" class="error-msg" style="display:none;"></div>

      <div class="form-group">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="email" id="forgot-email" placeholder="Email address">
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="doForgot()">
        Send Reset Link
      </button>

      <p class="auth-switch">
        <a href="{% url 'login' %}">← Back to Login</a>
      </p>

    </div>
  </div>
</div>

<script src="{% static 'core/js/main.js' %}"></script>
<script>
async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  const errorEl = document.getElementById('forgot-error');
  const successEl = document.getElementById('forgot-success');

  errorEl.style.display = 'none';
  successEl.style.display = 'none';

  if (!email) {
    errorEl.textContent = 'Please enter your email.';
    errorEl.style.display = 'block';
    return;
  }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('/forgot-password/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken'),
      },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (data.success) {
      successEl.textContent = data.message || 'Reset link sent!';
      successEl.style.display = 'block';
    } else {
      errorEl.textContent = data.error || 'Something went wrong.';
      errorEl.style.display = 'block';
    }
  } catch (err) {
    errorEl.textContent = 'Connection error. Try again.';
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
}
</script>
</body>
</html>
