{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexiAid – New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
<div class="forgot-center">
  <div class="forgot-inner fade-in">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:3rem;">🔐</div>
      <h1>Set New Password</h1>
      <p style="color:var(--muted);">Enter your new password below</p>
    </div>
    <div class="card space-y-5">
      {% if validlink %}
      <form method="POST">
        {% csrf_token %}
        <div class="form-group mb-3">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" name="new_password1" placeholder="New password" required>
        </div>
        <div class="form-group mb-3">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" name="new_password2" placeholder="Confirm new password" required>
        </div>
        {% if form.errors %}
        <div class="error-msg">
          {{ form.errors }}
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary btn-full btn-lg mt-3">
          Set New Password
        </button>
      </form>
      {% else %}
      <div class="error-msg">
        This reset link is invalid or has expired. Please request a new one.
      </div>
      <a href="{% url 'forgot_password' %}" class="btn btn-primary btn-full mt-3"
         style="text-decoration:none;display:flex;">
        Request New Link
      </a>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
