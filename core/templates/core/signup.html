{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexiAid – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  @font-face {
    font-family: 'OpenDyslexic';
    src: url('/static/core/images/OpenDyslexic-Regular.ttf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
  @font-face {
    font-family: 'Sylexiad';
    src: url('/static/core/images/SylexiadSansThin.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
</style>
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
  <!-- Apply saved font/size globally on every page -->
<script>
  (function() {
    try {
      const settings = JSON.parse(localStorage.getItem('lexiaid_settings') || '{}');
      const FONTS = {
        opendyslexic: "'OpenDyslexic', sans-serif",
        sylexiad: "'Sylexiad', sans-serif",
        courier: "'Courier New', Courier, monospace",
        verdana: "Verdana, Geneva, sans-serif",
      };
      if (settings.fontFamily && FONTS[settings.fontFamily]) {
        document.documentElement.style.fontFamily = FONTS[settings.fontFamily];
      }
      if (settings.fontSize) {
        document.documentElement.style.fontSize = settings.fontSize + 'px';
      }
    } catch(e) {}
  })();
</script>
</head>
<body>

<div id="toast"></div>

<div class="auth-shell">
  <!-- Left Hero -->
  <div class="auth-hero">
    <div class="auth-hero-logo">
      <img src="{% static 'core/images/logo.jpg' %}" alt="LexiAid Logo"
     style="width:40px;height:40px;border-radius:.5rem;object-fit:cover;">
      <span>LexiAid</span>
    </div>
    <div>
      <h2>Start Your<br><span>Learning Journey</span></h2>
      <p>Join thousands of students who are already reading with confidence.</p>
    </div>
    <p class="auth-hero-foot">✨ Powered by advanced AI</p>
  </div>

  <!-- Right Form -->
  <div class="auth-form-wrap">
    <div class="auth-form-inner fade-in">
      <h2>Create Account</h2>
      <p>Join LexiAid and start learning</p>

      <div id="signup-error" class="error-msg" style="display:none;"></div>

      <div class="space-y-4 mt-4">
        <div class="form-group">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="signup-name" placeholder="Full name">
        </div>

        <div class="form-group">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input type="email" id="signup-email" placeholder="Email address">
        </div>

        <div class="form-group">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="signup-pw" placeholder="Password">
          <button class="toggle-pw" onclick="togglePw('signup-pw')" type="button">👁</button>
        </div>

        <div class="form-group">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="signup-cpw" placeholder="Confirm password">
        </div>

        {% csrf_token %}
<button class="btn btn-primary btn-full btn-lg" onclick="doSignup()">
  Sign Up
</button>

        <p class="auth-switch">
          Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'core/js/main.js' %}"></script>
<script>
// Get CSRF token from Django
function getCSRF() {
  return document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-pw').value;
  const confirmPassword = document.getElementById('signup-cpw').value;
  const errorEl = document.getElementById('signup-error');

  errorEl.style.display = 'none';

  if (!name || !email || !password || !confirmPassword) {
    errorEl.textContent = 'Please fill in all fields.';
    errorEl.style.display = 'block';
    return;
  }
  if (password !== confirmPassword) {
    errorEl.textContent = 'Passwords do not match.';
    errorEl.style.display = 'block';
    return;
  }
  if (password.length < 6) {
    errorEl.textContent = 'Password must be at least 6 characters.';
    errorEl.style.display = 'block';
    return;
  }

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/signup/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCSRF(),
      },
      body: JSON.stringify({ name, email, password }),
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/dashboard/';
    } else {
      errorEl.textContent = data.error || 'Something went wrong.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign Up';
    }
  } catch (err) {
    errorEl.textContent = 'Connection error. Try again.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign Up';
  }
}
</script>
</body>
</html>
