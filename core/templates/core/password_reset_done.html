{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexiAid – Email Sent</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
<div class="forgot-center">
  <div class="forgot-inner fade-in" style="text-align:center;">
    <div style="font-size:4rem;margin-bottom:1rem;">📧</div>
    <h1>Check your email!</h1>
    <p style="color:var(--muted);margin-top:.5rem;">
      We've sent a password reset link to your email address.
      Click the link in the email to reset your password.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-full btn-lg mt-4"
       style="text-decoration:none;display:flex;">
      Back to Login
    </a>
  </div>
</div>
</body>
</html>
