{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexiAid – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
  <style>
  @font-face {
    font-family: 'OpenDyslexic';
    src: url('/static/core/images/OpenDyslexic-Regular.ttf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
  @font-face {
    font-family: 'Sylexiad';
    src: url('/static/core/images/SylexiadSansThin.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
</style>
  <!-- Apply saved font/size globally on every page -->
<script>
  (function() {
    try {
      const settings = JSON.parse(localStorage.getItem('lexiaid_settings') || '{}');
      const FONTS = {
        opendyslexic: "'OpenDyslexic', sans-serif",
        sylexiad: "'Sylexiad', sans-serif",
        courier: "'Courier New', Courier, monospace",
        verdana: "Verdana, Geneva, sans-serif",
      };
      if (settings.fontFamily && FONTS[settings.fontFamily]) {
        document.documentElement.style.fontFamily = FONTS[settings.fontFamily];
      }
      if (settings.fontSize) {
        document.documentElement.style.fontSize = settings.fontSize + 'px';
      }
    } catch(e) {}
  })();
</script>
</head>
<body>
<div id="toast"></div>
<div class="forgot-center">
  <div class="forgot-inner fade-in">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <img src="{% static 'core/images/logo.jpg' %}" alt="LexiAid"
           style="width:80px;height:80px;border-radius:1rem;object-fit:cover;margin:0 auto .75rem;display:block;">
      <h1>Reset Password</h1>
      <p>Enter your email and we'll send you a reset link</p>
    </div>
    <div class="card space-y-5">
      <form method="POST">
        {% csrf_token %}
        <div class="form-group mb-3">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input type="email" name="email" placeholder="Email address" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg mt-3">
          Send Reset Link
        </button>
      </form>
      <p class="auth-switch">
        <a href="{% url 'login' %}">← Back to Login</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
